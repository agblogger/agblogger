services:
  agblogger:
    build: .
    image: agblogger:latest
    user: root
    expose:
      - "8000"
    volumes:
      - ./content:/data/content
      - agblogger-db:/data/db
      - goatcounter-token:/data/goatcounter-token:ro
    environment:
      - SECRET_KEY=${SECRET_KEY?Set SECRET_KEY}
      - ADMIN_USERNAME=${ADMIN_USERNAME?Set ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD?Set ADMIN_PASSWORD}
      - ADMIN_DISPLAY_NAME=${ADMIN_DISPLAY_NAME:-}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS?Set TRUSTED_HOSTS}
      - TRUSTED_PROXY_IPS=${TRUSTED_PROXY_IPS:-[]}
      - TZ=UTC
      - CONTENT_DIR=/data/content
      - DATABASE_URL=sqlite+aiosqlite:////data/db/agblogger.db
      - DEBUG=${DEBUG:-false}
      - EXPOSE_DOCS=${EXPOSE_DOCS:-false}
      - AUTH_ENFORCE_LOGIN_ORIGIN=${AUTH_ENFORCE_LOGIN_ORIGIN:-true}
      - AUTH_SELF_REGISTRATION=${AUTH_SELF_REGISTRATION:-false}
      - AUTH_INVITES_ENABLED=${AUTH_INVITES_ENABLED:-true}
      - AUTH_LOGIN_MAX_FAILURES=${AUTH_LOGIN_MAX_FAILURES:-5}
      - AUTH_RATE_LIMIT_WINDOW_SECONDS=${AUTH_RATE_LIMIT_WINDOW_SECONDS:-300}
      - BLUESKY_CLIENT_URL=${BLUESKY_CLIENT_URL:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      default:
        ipv4_address: 172.30.0.3

  caddy:
    image: caddy:2
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      agblogger:
        condition: service_healthy
    restart: unless-stopped
    networks:
      default:
        ipv4_address: 172.30.0.2

  goatcounter:
    image: goatcounter/goatcounter:latest
    expose:
      - "8080"
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - goatcounter-db:/data/goatcounter
      - goatcounter-token:/data/goatcounter-token
      - ./goatcounter/entrypoint.sh:/entrypoint.sh:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      default:
        ipv4_address: 172.30.0.4

networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  agblogger-db:
  caddy-data:
  caddy-config:
  goatcounter-db:
  goatcounter-token:
